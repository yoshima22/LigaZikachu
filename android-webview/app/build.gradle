plugins {
    id "com.android.application"
    id "com.google.gms.google-services"
}

android {
    namespace "app.ligazikachu"
    compileSdk 35

    defaultConfig {
        applicationId "app.ligazikachu"
        minSdk 23
        targetSdk 34
        versionCode 7
        versionName "0.7.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation platform("com.google.firebase:firebase-bom:33.7.0")
    implementation "com.google.firebase:firebase-messaging"
}
