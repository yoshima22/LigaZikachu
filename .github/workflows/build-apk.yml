name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'android-webview/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install build tools and platform
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android-webview/local.properties

      - name: Verify google-services.json exists
        run: |
          if [ ! -f android-webview/app/google-services.json ]; then
            echo "ERRO: google-services.json não encontrado!"
            exit 1
          fi
          echo "google-services.json OK — project_id: $(cat android-webview/app/google-services.json | python3 -c 'import sys,json; print(json.load(sys.stdin)["project_info"]["project_id"])')"

      - name: Build debug APK
        working-directory: android-webview
        run: gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: liga-zikachu-apk-${{ github.run_number }}
          path: android-webview/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
