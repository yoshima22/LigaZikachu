name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'android-webview/**'
  workflow_dispatch: # permite rodar manualmente pelo GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > android-webview/app/google-services.json

      - name: Make gradlew executable
        run: chmod +x android-webview/gradlew
        continue-on-error: true

      - name: Build debug APK
        working-directory: android-webview
        run: |
          JAVA_HOME=$JAVA_HOME_21_X64
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.run_number }}
          path: android-webview/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
